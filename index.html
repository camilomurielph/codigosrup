<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUP Codes Manager</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div id="app">
        <header>
            <h1>📋 Gestor de Códigos RUP</h1>
            <nav>
                <button data-menu="copiar" class="active">📋 Copiar por Categoría</button>
                <button data-menu="seleccionar">✅ Selección Personalizada</button>
                <button data-menu="editar">✏️ Editar Códigos</button>
            </nav>
        </header>

        <main>
            <section id="menu-copiar" class="menu active">
                <h2>Copia todos los códigos de una categoría</h2>
                <div id="categoria-botones"></div>
            </section>

            <section id="menu-seleccionar" class="menu">
                <h2>Selecciona y copia solo los códigos que necesites</h2>
                <div id="contenedor-checkboxes"></div>
            </section>

            <section id="menu-editar" class="menu">
                <h2>Administra los códigos</h2>
                <div id="contenedor-edicion"></div>
            </section>
        </main>
    </div>

    <!-- Modal para Editar/Crear -->
    <div id="modal-form" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" id="cerrar-modal">&times;</span>
            <h3 id="modal-titulo">Nuevo Código</h3>
            <form id="codigo-form">
                <input type="hidden" id="edit-id" value="" />
                <label for="edit-categoria">Categoría</label>
                <input type="text" id="edit-categoria" required />

                <label for="edit-codigo">Código</label>
                <input type="text" id="edit-codigo" required />

                <label for="edit-descripcion">Descripción</label>
                <textarea id="edit-descripcion" required></textarea>

                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Modal para Nuevos en Lote -->
    <div id="modal-lote" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" id="cerrar-modal-lote">&times;</span>
            <h3 id="modal-lote-titulo">Nuevos Códigos en Lote</h3>
            <form id="lote-form">
                <input type="hidden" id="lote-categoria" value="" />
                <label for="lote-codigos">Pega los códigos (separados por espacio, coma o salto de línea):</label>
                <textarea id="lote-codigos" rows="10" placeholder="Ej: 101015 101016 101216 ..."></textarea>
                <button type="submit">Crear Códigos</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
